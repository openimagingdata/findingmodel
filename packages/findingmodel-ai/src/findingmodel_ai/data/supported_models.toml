# =============================================================================
# Per-agent model defaults (from March 2026 performance audit)
#
# Each agent declares an ordered fallback chain of (model, reasoning) pairs.
# At runtime, unavailable providers are filtered out and remaining models are
# wrapped in pydantic-ai's FallbackModel. If only one remains, it's used directly.
#
# Format:
#   models = [ { model = "provider:name", reasoning = "level" }, ... ]
#   tier_fallback = "small" | "base" | "full"   # last resort if all models unavailable
#
# Ordering: fastest/best for this task first, then alternatives by provider.
# Each chain should cover all three providers (OpenAI, Google, Anthropic) so
# the system works with any single API key configured.
# =============================================================================

# --- Simple generative: gpt-5-nano fastest + most consistent latency ---

[agents.ontology_search]
tier_fallback = "small"
models = [
    { model = "openai:gpt-5-nano", reasoning = "low" },
    { model = "google-gla:gemini-3-flash-preview", reasoning = "low" },
    { model = "anthropic:claude-haiku-4-5", reasoning = "low" },
]

[agents.describe_finding]
tier_fallback = "small"
models = [
    { model = "openai:gpt-5-nano", reasoning = "low" },
    { model = "google-gla:gemini-3-flash-preview", reasoning = "low" },
    { model = "anthropic:claude-haiku-4-5", reasoning = "low" },
]

# --- Structured generation: gemini-flash/minimal fastest for region+terms ---

