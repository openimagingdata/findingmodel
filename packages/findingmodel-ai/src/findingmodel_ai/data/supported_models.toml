# Supported Models Reference
#
# This file is the single source of truth for model configurations.
# Code consults this for reasoning normalization; smoke tests verify every entry.
#
# For unknown models (not listed here), the system falls back to provider-level
# defaults and passes the reasoning level as-is.
#
# Structure:
#   [providers.<name>]       — provider-level reasoning config
#   [models.<spec>]          — per-model reasoning support and normalization
#   [agents.<tag>]           — per-agent model fallback chain + reasoning defaults
#
# Model spec format: "provider:model-name" (e.g., "openai:gpt-5.4")

# =============================================================================
# Provider configurations
# =============================================================================

[providers.openai]
# Reasoning via OpenAIResponsesModelSettings(openai_reasoning_effort=level).
# "none" returns no settings (no reasoning overhead).

[providers.google]
# Reasoning via GoogleModelSettings(google_thinking_config={"thinking_level": LEVEL}).
# Level values are uppercase: MINIMAL, LOW, MEDIUM, HIGH.
# Thinking cannot be fully disabled on Gemini 3 models.

[providers.anthropic]
# Opus 4.6+ uses adaptive thinking: AnthropicModelSettings(anthropic_thinking={'type': 'adaptive'}, anthropic_effort=level).
# Older models (sonnet-4-6, haiku-4-5) use extended thinking with budget_tokens (see budget_map below).
# "none" disables thinking entirely on all models.
# max_tokens capped at 16384 to avoid Anthropic SDK streaming requirement.
[providers.anthropic.budget_map]
minimal = { budget_tokens = 1024, max_tokens = 8192 }
low     = { budget_tokens = 1024, max_tokens = 8192 }
medium  = { budget_tokens = 4096, max_tokens = 16384 }
high    = { budget_tokens = 10240, max_tokens = 16384 }
xhigh   = { budget_tokens = 16000, max_tokens = 16384 }

[providers.ollama]
# No API key required. No reasoning support.

[providers.gateway]
# Gateway routes to the underlying provider — the SAME models with the SAME
# reasoning configurations, just accessed through a single gateway API key
# instead of per-provider keys.
#
# Gateway prefixes and their canonical equivalents:
#   gateway/openai:gpt-5.4         → same as openai:gpt-5.4
#   gateway/anthropic:claude-...   → same as anthropic:claude-...
#   gateway/google:gemini-...      → same as google-gla:gemini-...
#   gateway/google-vertex:gemini-… → same as google-gla:gemini-...
#
# Models are NOT duplicated below — normalization resolves gateway specs to
# their canonical direct-provider form automatically.


# =============================================================================
# OpenAI models
# =============================================================================

[models."openai:gpt-5.4"]
provider = "openai"
valid_reasoning = ["none", "low", "medium", "high", "xhigh"]
notes = "Flagship model. Default base and full tier."
[models."openai:gpt-5.4".normalize]
minimal = "low"

[models."openai:gpt-5-mini"]
provider = "openai"
valid_reasoning = ["none", "low", "medium", "high"]
notes = "Cost-effective. Good base tier override."
[models."openai:gpt-5-mini".normalize]
minimal = "low"
xhigh = "high"

[models."openai:gpt-5.4-mini"]
provider = "openai"
valid_reasoning = ["none", "low", "medium", "high"]
notes = "GPT-5.4 architecture in mini form. 2x faster than gpt-5-mini, approaches flagship quality. Released 2026-03-17."
[models."openai:gpt-5.4-mini".normalize]
minimal = "low"
xhigh = "high"

[models."openai:gpt-5.4-nano"]
provider = "openai"
valid_reasoning = ["none", "low", "medium", "high"]
notes = "GPT-5.4 architecture in nano form. Outperforms old gpt-5-mini at max reasoning. Released 2026-03-17."
[models."openai:gpt-5.4-nano".normalize]
minimal = "low"
xhigh = "high"

[models."openai:gpt-5-nano"]
provider = "openai"
valid_reasoning = ["none", "low", "medium", "high"]
notes = "Previous-gen lightest OpenAI option. Consider gpt-5.4-nano instead."
[models."openai:gpt-5-nano".normalize]
minimal = "low"
xhigh = "high"


